<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lección 1 - Planificador de viajes</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">


</head>
<body>

    <header>
        
        <nav>

            <a href="#"><img src="./img/logo.webp" id="img-logo" alt="Logo de Mifesa"></a>

             <ul>
                <a href="#formulario"><li>Viaja</li></a>
                <a href="#boletos"><li>Tus boletos</li></a>
            </ul>

        </nav>

    </header>
    
    
    <main>

        <!-- formulario -->
        <form id="formulario">

            <!-- lista desplegable -->
            <label for="lista-destinos">Destinos disponibles:</label>
            <select name="lista-destinos" id="lista-destinos">
                <option selected="true" disabled>Seleccione una opción</option>
            </select>

            <!-- fecha -->
            <label for="input-date">Fecha</label>
            <input type="date" name="fecha" id="input-date">

            <!-- cantidad de personas -->
            <label for="lista-cantidad-personas">Cantidad de personas:</label>
            <select name="lista-cantidad-personas" id="lista-cantidad-personas">
                <option selected="true" disabled>Seleccione una opción</option>
            </select>
            
            <!-- radiobuttons con los medios de transporte -->
            <fieldset>
                
            
                <input type="radio" name="transporte" id="input-tren" value="Tren">
                <label for="input-tren">Tren</label>

                <input type="radio" name="transporte" id="input-avion" value="Avión">
                <label for="input-avion">Avión</label>
            </fieldset>


            <button type="submit" class="btn-enviar">Enviar</button>


        </form>

        <!-- contenedor de los viajes que hemos guardado -->
        <section id="boletos" class="contenedor-viajes">


        </section>


    </main>

    <script type="module" src="./script/app.js"></script>
</body>
</html>
