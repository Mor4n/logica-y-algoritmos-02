<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <main> 


        <div id="carrito">
            <h2>Lista de compras</h2>
            <table id="lista-compras">
                <thead>
                    <tr>
                        <th>Imagen</th>
                        <th>Producto</th>
                        <th>Precio</th>
                </thead>
                <tbody>

                </tbody>

            </table>

            <button id="vaciar-carrito">
                Vaciar carrito
            </button>

        </div>


        <section id="seccion-productos">
            <h2>Seleccione productos para añadirlos a su lista de compras</h2>
            <div class="card-producto">
                <img src="https://i5.walmartimages.com/asr/5a437154-e69e-455a-94b1-3526d4d89a76.c2b1e1930608a4802d602cfdb13bbfa6.jpeg?odnHeight=612&odnWidth=612&odnBg=FFFFFF" alt="Imagen de Pringles" class="producto-img">
                <h3 class="producto-titulo">Pringles</h3>
                <p class="producto-precio">$51.40</p>
                <button class="producto-agregar">Agregar a la lista</button>
            </div>
            <div class="card-producto">
                <img src="https://i5-mx.walmartimages.com/mg/images/product-images/img_large/00750101116763l.jpg" alt="Imagen de Pizzerolas" class="producto-img">
                <h3 class="producto-titulo">Pizzerolas</h3>
                <p class="producto-precio">$29.45</p>
                <button class="producto-agregar">Agregar a la lista</button>
            </div>
            <div class="card-producto">
                <img src="https://media.istockphoto.com/id/504384796/es/foto/maduros-frescos-tangerines.jpg?s=612x612&w=0&k=20&c=PqIgR6aGkqAFl9y9B6dNd4HoMd37WigyAg2JKZ2_F0I=" alt="Imagen de mandarina" class="producto-img">
                <h3 class="producto-titulo">Mandarina</h3>
                <p class="producto-precio">$6.00</p>
                <button class="producto-agregar">Agregar a la lista</button>
            </div>
            <div class="card-producto">
                <img src="https://i5.walmartimages.com.mx/mg/gm/3pp/asr/6fcd5da3-4494-4afb-927b-bf2344ecee3f.e0718279add087004d062ea46263c0c1.jpeg?odnHeight=612&odnWidth=612&odnBg=FFFFFF" alt="Imagen de Coca-Cola" class="producto-img">
                <h3 class="producto-titulo">Refresco Victoria Grosella💕</h3>
                <p class="producto-precio">$18.00</p>
                <button class="producto-agregar">Agregar a la lista</button>
            </div>


        </section>

    </main>

</body>
</html>
