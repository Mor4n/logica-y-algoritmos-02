<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>

    <form action="" id="formulario">

        <input type="text" name="" id="input-nombre-persona" placeholder="Ingrese el nombre de la persona">
        
        <div id="botones">
            <button id="btn-agregar">Agregar persona a la lista</button>

            <button type="submit" id="btn-enviar">Ver parejas con la misma inicial </button>
        </div>
    </form>

    <div id="lista-personas">
        <h2>Personas agregadas:</h2>
    </div>

    <section>
        <h2>La pareja inicial con la misma inicial es:</h2>
        <ul id="resultado">

        </ul>
    </section>

    <section>
        <h2>Total de parejas que tienen misma inicial:</h2>
        <ul id="resultado-total-parejas">

        </ul>
    </section>
    
    
    
    <script src="./script/app.js"></script>
