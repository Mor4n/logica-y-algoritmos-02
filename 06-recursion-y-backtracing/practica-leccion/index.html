<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">    
    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>

    <h1>Lección 6 - Recursión y backtracing: Lista de regalos</h1>

    <form class="formulario" id="formulario-lista-regalos">
        <input type="text" class="input-regalos" id="input-lista-regalos" placeholder="Ingrese su lista de regalos (separelos con un ',')">
        <button class="boton-enviar" type="submit">Agregar lista de regalos</button>
    </form>

    <form class="formulario" id="formulario-buscar-regalo">
        <input type="text" class="input-regalos" id="input-buscar-regalo" placeholder="Ingrese un regalo a buscar">
        <button class="boton-enviar" id="boton-buscar-regalo"type="submit">Buscar regalo</button>
    </form>


    <div class="contenedores" id="contenedor-lista-regalos">
        <h2>Lista de regalos:</h2>

        <ul id="lista-regalos">

        </ul>

    </div>

    <div class="contenedores" id="contenedor-buscar-regalo">
        <h2>Resultado de búsqueda: <span id="regalo-encontrado"></span></h2>
        
     </div>

    <script src="./script/app.js"></script>
</body>
