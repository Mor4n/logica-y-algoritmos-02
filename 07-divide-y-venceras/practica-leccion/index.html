<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <h1>Práctica 7 - Divide y vencerás: Encontrar el número máximo de un arreglo </h1>

    <h2>Ingrese en el siguiente input los números que contendrá el arreglo</h2>
    <form id="formulario">
        
        <input type="text" id="input-arreglo" placeholder="Escriba aquí números, ejemplo: 2,20,4,76,4">
        <button type="submit"  id="boton-enviar">Encontrar el número máximo</button>

    </form>

    <div>
        <h2>El número máximo es: <span id="resultado"></span></h2>
    </div>


    <script src="./script/app.js"></script>
